base:
  app_name: "SAARTHI"

jwt:
  algorithm: "HS256"
  access_token_expire_minutes: 30

rate_limiting:
  default_limit: "50/minute"
  login_limit: "5/minute"
  chat_limit: "10/minute"

ai_service:
  models:
    - provider: ollama
      name: "qwen3:0.6b"
      priority: 1

    - provider: ollama
      name: "qwen3:4b"
      priority: 2

    - provider: openai
      name: "gpt-4.1-nano"
      priority: 3

    - provider: openai
      name: "gpt-4o-mini"
      priority: 4

    - provider: gemini
      name: "gemini-2.0-flash"
      priority: 6

    - provider: gemini
      name: "gemini-2.0-flash-lite"
      priority: 5

    - provider: openrouter
      name: "mistralai/mistral-7b-instruct:free"
      priority: 0
