base:
  app_name: "SAARTHI"

logging:
  level: "INFO" # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  log_file: "logs/app.log" # Path relative to where the app runs

jwt:
  algorithm: "HS256"
  access_token_expire_minutes: 30

rate_limiting:
  default_limit: "50/minute"
  login_limit: "5/minute"
  chat_limit: "10/minute"

ai_service:
  models:
    - provider: ollama
      name: "qwen3:0.6b"
      priority: 4

    - provider: ollama
      name: "phi3:mini"
      priority: 3

    - provider: openai
      name: "gpt-4.1-nano"
      priority: 1

    - provider: openai
      name: "gpt-4o-mini"
      priority: 2
